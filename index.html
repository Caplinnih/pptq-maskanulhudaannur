<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Judul yang akan muncul di Tab Browser -->
    <title>Maskanul Huda An-nur</title>
    
    <!-- Meta Tag untuk branding sederhana -->
    <meta name="description" content="Maskanul Huda An-nur">
    <meta name="theme-color" content="#2196F3">

    <style>
        /* Reset tampilan standar */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #f4f4f9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container untuk Iframe */
        .app-container {
            position: relative;
            height: 100%;
            width: 100%;
        }

        /* Styling Iframe */
        iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
            z-index: 10;
        }

        /* Animasi Loading saat web dibuka */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            z-index: 5;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            margin-top: 15px;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="loader-container" id="loadingScreen">
        <div class="loader"></div>
        <div class="loader-text">Menyiapkan Sistem...</div>
    </div>

    <div class="app-container">
        <!-- Iframe yang memanggil Google Apps Script Anda -->
        <iframe 
            src="https://script.google.com/macros/s/AKfycbzY89_x8GFeiBSu8G8XhIcgKhHTB69jrkcJhrK8TZpFrlEkUclvYP8MNUNgZIK3eqcMEA/exec"
            allow="camera; microphone; geolocation"
            onload="hideLoader()">
        </iframe>
    </div>

    <script>
        // Fungsi untuk menghilangkan loading screen setelah iframe termuat
        function hideLoader() {
            const loader = document.getElementById('loadingScreen');
            // Beri sedikit delay agar transisi lebih mulus
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }
    </script>

</body>
</html>
