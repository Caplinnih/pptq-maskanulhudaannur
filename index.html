<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maskanul Huda An-nur</title>

  <!-- Font Arab Elegan -->
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #047857, #10b981);
      z-index: 10;
      text-align: center;
      padding: 20px;
    }

    .loading-text {
      font-family: 'Amiri', serif;
      font-size: 34px;
      color: #ffd700;
      line-height: 1.8;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-text">
    Jazakumullahu Khairan<br>
    atas kunjungan Anda di website<br>
    Pondok Pesantren Tahfidzul Qur'an Maskanul Huda An-nur
  </div>
</div>

<iframe 
  src="https://script.google.com/macros/s/AKfycbzVd5pyUv5AIgRbi1CqewA6XENFdu3WUFD-aRgjsG_5NG7czKSaANU4--6A4GzzLN4EyQ/exec"
  allow="camera; microphone; geolocation"
  onload="document.getElementById('loading').style.display='none'">
</iframe>

</body>
</html>
